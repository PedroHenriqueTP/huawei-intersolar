<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huawei Intersolar 2026 - Key Pass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep-space: #0D0E12;
      --emerald-green: #00E676;
      --cyber-orange: #FF5722;
      --slate-gray: #1E222B;
      --text-primary: #F5F7FA;
      --text-muted: #8F9CAE;
      --glass-bg: rgba(30, 34, 43, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: var(--bg-deep-space);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      background-image: radial-gradient(circle at 10% 20%, rgba(0, 230, 118, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(255, 87, 34, 0.08) 0%, transparent 40%);
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    header h1 span {
      background: linear-gradient(135deg, var(--emerald-green), var(--cyber-orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 300;
    }
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      padding: 30px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group input, .form-group select {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: inherit;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--emerald-green);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 10px rgba(0, 230, 118, 0.2);
    }
    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--emerald-green), rgba(0, 230, 118, 0.8));
      color: var(--bg-deep-space);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 230, 118, 0.5);
      background: linear-gradient(135deg, var(--emerald-green), #00ff80);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--text-primary);
      box-shadow: none;
      margin-top: 15px;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--cyber-orange);
      box-shadow: 0 4px 15px rgba(255, 87, 34, 0.2);
    }
    .message {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      display: none;
    }
    .message.success {
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid var(--emerald-green);
      color: var(--emerald-green);
      display: block;
    }
    .message.error {
      background: rgba(255, 87, 34, 0.1);
      border: 1px solid var(--cyber-orange);
      color: var(--cyber-orange);
      display: block;
    }
    .nfc-token-display {
      display: flex;
      gap: 10px;
    }
    .btn-small {
      width: auto;
      margin-top: 0;
      padding: 10px 15px;
      font-size: 0.9rem;
      background: var(--slate-gray);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }
    .btn-small:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }
    .links-section {
      margin-top: 20px;
      text-align: center;
    }
    .links-section a {
      color: var(--emerald-green);
      text-decoration: none;
      font-size: 0.95rem;
      margin: 0 15px;
      transition: color 0.3s;
    }
    .links-section a:hover {
      color: var(--cyber-orange);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <h1>Huawei <span>FusionSolar</span></h1>
    <p>Intersolar South America 2026</p>
  </header>

  <div class="glass-card">
    <div id="statusMessage" class="message"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Seu Nome</label>
        <placeholder>Digite seu nome completo</placeholder>
        <input type="text" id="name" placeholder="Como quer ser chamado(a)?" required>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="nome@exemplo.com" required>
      </div>

      <div class="form-group">
        <label for="company">Empresa (Opcional)</label>
        <input type="text" id="company" placeholder="Qual sua empresa?">
      </div>

      <div class="form-group">
        <label for="keyPassToken">Código NFC (Key Pass)</label>
        <div class="nfc-token-display">
          <input type="text" id="keyPassToken" placeholder="Tag NFC ou Código QR" required readonly>
          <button type="button" class="btn btn-small" onclick="generateRandomToken()">Gerar</button>
        </div>
      </div>

      <button type="submit" class="btn">Criar Meu Key Pass</button>
    </form>

    <div id="bindingSection" style="display: none; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;">
      <h3 style="font-weight: 600; font-size: 1.1rem; margin-bottom: 15px;">Simular Scan de Aproximação (NFC)</h3>
      <div class="form-group">
        <label for="machineSelect">Escolher Estação / Ativação</label>
        <select id="machineSelect">
          <option value="bike_01">Bike Energy 01</option>
          <option value="bike_02">Bike Energy 02</option>
          <option value="fast_feet_01">Fast Feet</option>
          <option value="gerador_manivela_01">Gerador de Energia</option>
        </select>
      </div>
      <button type="button" class="btn btn-secondary" onclick="simulateScan()">Aproximar Celular (Scan NFC)</button>
    </div>
  </div>

  <div class="links-section">
    <a href="/totem.html" target="_blank">Ver Painel do Totem Local</a>
    <a href="/leaderboard.html" target="_blank">Ver Telão de LED Global</a>
  </div>

  <script>
    function generateRandomToken() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let token = 'NFC_';
      for (let i = 0; i < 8; i++) {
        token += chars.charAt(Math.floor(chars.random() * chars.length));
      }
      document.getElementById('keyPassToken').value = token;
    }

    // Auto-generate token on load
    window.onload = generateRandomToken;

    const form = document.getElementById('registerForm');
    const msgDiv = document.getElementById('statusMessage');
    const bindingSection = document.getElementById('bindingSection');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        company: document.getElementById('company').value || undefined,
        keyPassToken: document.getElementById('keyPassToken').value
      };

      try {
        const response = await fetch('/session/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        
        if (response.ok) {
          msgDiv.className = "message success";
          msgDiv.innerHTML = `<strong>Sucesso!</strong> Registro concluído. Seu Key Pass <strong>${data.keyPassToken}</strong> está ativo.`;
          bindingSection.style.display = "block";
        } else {
          msgDiv.className = "message error";
          msgDiv.innerHTML = `<strong>Erro:</strong> ${data.message || 'Falha no cadastro.'}`;
        }
      } catch (err) {
        msgDiv.className = "message error";
        msgDiv.innerHTML = `<strong>Erro de Conexão:</strong> Não foi possível falar com o servidor. O modo offline registrará você temporariamente local.`;
        
        // Simular offline local storage
        localStorage.setItem(`offline_user_${payload.keyPassToken}`, JSON.stringify(payload));
        bindingSection.style.display = "block";
      }
    });

    async function simulateScan() {
      const keyPassToken = document.getElementById('keyPassToken').value;
      const machineId = document.getElementById('machineSelect').value;
      
      let activationType = "BIKE_ENERGY";
      if (machineId.startsWith("fast_feet")) {
        activationType = "FAST_FEET";
      } else if (machineId.startsWith("gerador")) {
        activationType = "ENERGY_GENERATOR";
      }

      const payload = {
        keyPassToken,
        machineId,
        activationType
      };

      try {
        const response = await fetch('/session/bind', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          msgDiv.className = "message success";
          msgDiv.innerHTML = `<strong>NFC Escaneado!</strong> Celular aproximado do totem <strong>${machineId}</strong>. O painel da máquina iniciará o jogo!`;
        } else {
          msgDiv.className = "message error";
          msgDiv.innerHTML = `<strong>Erro de Scan:</strong> ${data.message}`;
        }
      } catch (err) {
        // Fallback offline scan simulation
        msgDiv.className = "message success";
        msgDiv.innerHTML = `<strong>NFC Escaneado (OFFLINE)!</strong> Salvo localmente para sincronização posterior.`;
        
        // Disparar binding offline
        const offlineBind = {
          keyPassToken,
          machineId,
          activationType,
          offline: true
        };
        localStorage.setItem(`offline_bind_${machineId}`, JSON.stringify(offlineBind));
      }
    }
  </script>
</body>
</html>
