<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huawei Intersolar 2026 - Totem Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep-space: #0D0E12;
      --emerald-green: #00E676;
      --cyber-orange: #FF5722;
      --slate-gray: #1E222B;
      --text-primary: #F5F7FA;
      --text-muted: #8F9CAE;
      --glass-bg: rgba(30, 34, 43, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: var(--bg-deep-space);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow: hidden;
      background-image: radial-gradient(circle at 50% 50%, rgba(30, 34, 43, 0.8) 0%, var(--bg-deep-space) 100%);
    }
    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }
    .top-bar h2 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .top-bar h2 span {
      color: var(--emerald-green);
    }
    .machine-selector {
      background: var(--slate-gray);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 6px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      width: 100%;
      min-height: 480px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      text-align: center;
      position: relative;
      transition: all 0.5s ease;
    }
    
    /* State: Idle */
    .state-idle .nfc-icon-wrapper {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(0, 230, 118, 0.05);
      border: 2px dashed rgba(0, 230, 118, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      animation: pulse 2s infinite;
    }
    .state-idle svg {
      width: 60px;
      height: 60px;
      fill: var(--emerald-green);
    }
    .state-idle h3 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 12px;
      max-width: 600px;
    }
    .state-idle p {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 300;
    }

    /* State: Active */
    .state-active {
      display: none;
      width: 100%;
    }
    .active-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      gap: 40px;
      align-items: center;
    }
    .active-left {
      text-align: left;
    }
    .active-left h3 {
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .active-left h4 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 30px;
      color: var(--text-primary);
    }
    .active-left h4 span {
      color: var(--emerald-green);
    }
    .gauge-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .gauge-value {
      font-size: 4.5rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
    }
    .gauge-label {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .timer-badge {
      position: absolute;
      top: -20px;
      right: -20px;
      background: var(--cyber-orange);
      color: var(--text-primary);
      font-size: 1.6rem;
      font-weight: 800;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(255, 87, 34, 0.4);
      border: 3px solid var(--bg-deep-space);
    }
    .progress-section {
      margin-top: 40px;
      width: 100%;
      text-align: left;
    }
    .progress-section label {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .progress-section label span.val {
      color: var(--emerald-green);
      font-weight: 600;
    }
    .energy-loader-container {
      width: 100%;
      height: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .energy-loader-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyber-orange), var(--emerald-green));
      box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
      border-radius: 8px;
      transition: width 0.1s linear;
    }

    /* State: Completed */
    .state-completed {
      display: none;
    }
    .state-completed h3 {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--emerald-green);
      margin-bottom: 20px;
    }
    .state-completed p.socratic-msg {
      font-size: 1.4rem;
      font-weight: 300;
      line-height: 1.6;
      max-width: 700px;
      margin-bottom: 40px;
      color: var(--text-primary);
    }
    .state-completed p.socratic-msg strong {
      color: var(--cyber-orange);
      font-weight: 600;
    }
    .btn-reset {
      background: var(--slate-gray);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 30px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
    }
    .btn-reset:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--emerald-green);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.2);
      }
      70% {
        transform: scale(1.05);
        box-shadow: 0 0 0 20px rgba(0, 230, 118, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="top-bar">
      <h2>Huawei <span>FusionSolar</span></h2>
      <select id="machineSelect" class="machine-selector" onchange="changeMachine()">
        <option value="bike_01">Estação: Bike Energy 01</option>
        <option value="bike_02">Estação: Bike Energy 02</option>
        <option value="fast_feet_01">Estação: Fast Feet</option>
        <option value="gerador_manivela_01">Estação: Gerador de Energia</option>
      </select>
    </div>

    <!-- Main Card -->
    <div id="totemCard" class="glass-card">
      
      <!-- IDLE STATE -->
      <div id="panelIdle" class="state-idle">
        <div class="nfc-icon-wrapper">
          <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8l1.46 1.46c-.1.43-.16.88-.16 1.34 0 2.21 1.79 4 4 4 .46 0 .91-.06 1.34-.16l1.46 1.46c-.83.45-1.79.7-2.8.7zm0-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.3-1.2c.45.83.7 1.79.7 2.8 0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l1.46-1.46c.43.1.88.16 1.34.16 2.21 0 4-1.79 4-4 0-.46-.06-.91-.16-1.34l1.46-1.46z"/>
          </svg>
        </div>
        <h3>Olá! Que bom ter você no espaço Huawei.</h3>
        <p>Aproxime seu celular (Key Pass) do leitor para começar o desafio!</p>
      </div>

      <!-- ACTIVE STATE -->
      <div id="panelActive" class="state-active">
        <div class="timer-badge" id="timerVal">60s</div>
        
        <div class="active-grid">
          <div class="active-left">
            <h3>Competidor Ativo</h3>
            <h4 id="competitorName">Carregando...</h4>
            <p style="color: var(--text-muted); font-size: 1.05rem;" id="activationMessage">
              Pedale com ritmo constante para acumular energia!
            </p>
          </div>
          
          <div class="gauge-wrapper">
            <div class="gauge-value" id="cadenceVal">0</div>
            <div class="gauge-label" id="cadenceLabel">RPM</div>
          </div>
        </div>

        <div class="progress-section">
          <label>
            <span>Energia Gerada</span>
            <span class="val" id="energyText">0W / 1000W</span>
          </label>
          <div class="energy-loader-container">
            <div class="energy-loader-fill" id="energyFill" style="width: 0%;"></div>
          </div>
        </div>
      </div>

      <!-- COMPLETED STATE -->
      <div id="panelCompleted" class="state-completed">
        <h3 id="completionTitle">Desafio Concluído!</h3>
        <p class="socratic-msg" id="socraticFeedback">
          Carregando feedback...
        </p>
        <button class="btn-reset" onclick="resetPanel()">Voltar ao Início</button>
      </div>

    </div>
  </div>

  <!-- Socket.io Library served from same NestJS server -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket;
    let activeMachineId = 'bike_01';

    function initSocket() {
      // Connect to local WebSocket namespace
      socket = io('/');

      socket.on('connect', () => {
        console.log('Connected to WebSocket server.');
        bindWebSocketEvents();
      });

      socket.on('disconnect', () => {
        console.log('Disconnected from WebSocket server.');
      });
    }

    function bindWebSocketEvents() {
      // Clean previous listeners
      socket.off(`telemetry:${activeMachineId}`);
      socket.off(`session_end:${activeMachineId}`);

      // Listen for session binding updates (first telemetry packet or active check)
      socket.on(`telemetry:${activeMachineId}`, (session) => {
        showActiveState(session);
      });

      // Listen for session completed event
      socket.on(`session_end:${activeMachineId}`, (summary) => {
        showCompletedState(summary);
      });
    }

    function changeMachine() {
      activeMachineId = document.getElementById('machineSelect').value;
      console.log('Switched to machine:', activeMachineId);
      
      // Update display details based on machine type
      const cadenceLabel = document.getElementById('cadenceLabel');
      const actMsg = document.getElementById('activationMessage');
      
      if (activeMachineId.startsWith('fast_feet')) {
        cadenceLabel.innerText = "PASSOS/S";
        actMsg.innerText = "Corra e pule sobre a plataforma o mais rápido que puder!";
      } else if (activeMachineId.startsWith('gerador')) {
        cadenceLabel.innerText = "RPM";
        actMsg.innerText = "Gire a manivela com força para acender o painel demonstrativo!";
      } else {
        cadenceLabel.innerText = "RPM";
        actMsg.innerText = "Pedale com ritmo constante para acumular energia solar!";
      }

      resetPanel();
      bindWebSocketEvents();
    }

    function showActiveState(session) {
      document.getElementById('panelIdle').style.display = 'none';
      document.getElementById('panelCompleted').style.display = 'none';
      
      const panelActive = document.getElementById('panelActive');
      panelActive.style.display = 'block';

      // Update values
      document.getElementById('competitorName').innerText = session.userName;
      document.getElementById('timerVal').innerText = Math.round(session.timeRemaining) + 's';
      document.getElementById('cadenceVal').innerText = Math.round(session.cadence);
      
      const target = 1000;
      const progress = Math.min(100, (session.score / target) * 100);
      
      document.getElementById('energyText').innerText = Math.round(session.score) + 'W / ' + target + 'W';
      document.getElementById('energyFill').style.width = progress + '%';
    }

    function showCompletedState(summary) {
      document.getElementById('panelIdle').style.display = 'none';
      document.getElementById('panelActive').style.display = 'none';
      
      const panelCompleted = document.getElementById('panelCompleted');
      panelCompleted.style.display = 'block';

      document.getElementById('socraticFeedback').innerHTML = summary.message;
    }

    function resetPanel() {
      document.getElementById('panelCompleted').style.display = 'none';
      document.getElementById('panelActive').style.display = 'none';
      document.getElementById('panelIdle').style.display = 'block';
      
      // Reset progress bar
      document.getElementById('energyFill').style.width = '0%';
    }

    // Initialize on load
    window.onload = () => {
      changeMachine();
      initSocket();
    };
  </script>
</body>
</html>
